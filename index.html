<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NailBooker</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
</head>

<body>

<header class="topbar">
<button id="backBtn" class="back-btn hidden-btn">←</button>
<h1 id="screenTitle">Agenda</h1>
</header>

<main class="main-layout">

<!-- AGENDA -->
<section id="agendaScreen" class="screen active">

<div class="calendar-header">
<button id="prevMonthBtn">‹</button>
<button id="monthPickerBtn"></button>
<button id="nextMonthBtn">›</button>
</div>

<div id="calendarGrid" class="calendar-grid"></div>

<h2 id="agendaListTitle"></h2>
<div id="agendaList"></div>

</section>

<!-- CLIENTS -->
<section id="clientsScreen" class="screen">

<div class="search-bar">
<input id="clientSearch" placeholder="Zoek klant...">
</div>

<div id="alphabetFilter" class="alphabet-filter"></div>

<div id="clientsList"></div>

</section>

<!-- CLIENT DETAIL -->
<section id="clientDetailScreen" class="screen">
<div id="clientDetailContent"></div>
</section>

<!-- SERVICES -->
<section id="servicesScreen" class="screen">
<div id="servicesList"></div>
</section>

<!-- REVENUE -->
<section id="revenueScreen" class="screen">

<div class="filter-grid">

<select id="revenuePeriodType" class="field compact-field">
<option value="day">Dag</option>
<option value="week">Week</option>
<option value="month" selected>Maand</option>
<option value="year">Jaar</option>
</select>

<input id="revenueDate" class="field compact-field" type="date">

<select id="revenuePaymentStatusFilter" class="field compact-field">
<option value="">Betaald + onbetaald</option>
<option value="paid">Enkel betaald</option>
<option value="unpaid">Enkel onbetaald</option>
</select>

<select id="revenuePaymentFilter" class="field compact-field">
<option value="">Alle betaalmiddelen</option>
</select>

<select id="revenueCustomerFilter" class="field compact-field">
<option value="">Alle klanten</option>
</select>

</div>

<h2 id="revenueTitle"></h2>

<div class="summary-grid">

<div class="summary-card">
<span class="summary-label">Totaal</span>
<span id="plannedRevenue"></span>
</div>

<div class="summary-card">
<span class="summary-label">Betaald</span>
<span id="paidRevenue"></span>
</div>

<div class="summary-card">
<span class="summary-label">Open</span>
<span id="openRevenue"></span>
</div>

</div>

<div id="paymentMethodList"></div>

</section>

<!-- ACCOUNT -->
<section id="accountScreen" class="screen">

<div class="detail-card">
<div class="detail-block">

<div class="detail-label">Registreren</div>

<label>Naam</label>
<input id="registerName" class="field">

<label>Email</label>
<input id="registerEmail" type="email" class="field">

<label>Wachtwoord</label>
<input id="registerPassword" type="password" class="field">

<button id="registerBtn" class="btn btn-primary action-btn">Registreren</button>

</div>
</div>

<div class="detail-card">
<div class="detail-block">

<div class="detail-label">Inloggen</div>

<label>Email</label>
<input id="loginEmail" type="email" class="field">

<label>Wachtwoord</label>
<input id="loginPassword" type="password" class="field">

<button id="loginBtn" class="btn btn-primary action-btn">Inloggen</button>

</div>
</div>

<div class="detail-card">
<div class="detail-block">

<div class="detail-label">Status</div>
<div id="authStatus">Niet ingelogd</div>

<button id="logoutBtn" class="btn btn-secondary action-btn">Uitloggen</button>

</div>
</div>

</section>

</main>

<!-- FLOATING BUTTON -->
<button id="floatingAddBtn" class="floating-add">+</button>

<!-- NAVIGATION -->
<nav class="bottom-nav">

<button class="nav-btn active" data-screen="agendaScreen" data-title="Agenda">
<span>📅</span>
<span>Agenda</span>
</button>

<button class="nav-btn" data-screen="clientsScreen" data-title="Klanten">
<span>👤</span>
<span>Klanten</span>
</button>

<button class="nav-btn" data-screen="servicesScreen" data-title="Diensten">
<span>💅</span>
<span>Diensten</span>
</button>

<button class="nav-btn" data-screen="revenueScreen" data-title="Omzet">
<span>€</span>
<span>Omzet</span>
</button>

<button class="nav-btn" data-screen="accountScreen" data-title="Account">
<span>🔐</span>
<span>Account</span>
</button>

</nav>

<!-- PAYMENT DIALOG -->
<dialog id="paymentDialog">

<form id="paymentForm">

<h3>Betaling registreren</h3>

<p id="paymentAmount"></p>

<select id="paymentMethod" class="field">

<option value="cash">Cash</option>
<option value="payconiq">Payconiq</option>
<option value="bancontact">Bancontact</option>
<option value="overschrijving">Overschrijving</option>

</select>

<input id="paymentAppointmentId" type="hidden">

<div class="dialog-actions">

<button type="button" id="markUnpaidBtn">Onbetaald</button>
<button type="submit">Opslaan</button>
<button type="button" data-close="paymentDialog">Sluiten</button>

</div>

</form>

</dialog>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>

</body>
</html>
